name: Novel Daily Feishu Push

on:
  schedule:
    # 每天上午10点（北京时间）执行，UTC+8 = UTC 2:00
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  push-novel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Feishu push script
        run: python novels/末世爽文/feishu_push.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit state update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add novels/末世爽文/push_state.json
          git diff --staged --quiet || git commit -m "chore: update novel push state [skip ci]"
          git push
